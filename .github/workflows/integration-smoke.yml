name: integration-smoke

# End-to-end check that nvext.agent_context fields emitted by this package
# round-trip through Dynamo's actual frontend + mocker into the agent trace
# sink. Catches more than a source-grep — wire envelope changes, trace sink
# format changes, subagent bridge regressions, and our own breakage.
#
# Two trigger paths:
#   * PR / push to main against PINNED_DYNAMO_VERSION below. Stable, doesn't
#     break on upstream's branch-state churn.
#   * Nightly cron against ai-dynamo/dynamo `main`. Opens an issue on failure
#     so upstream drift is surfaced without blocking unrelated PRs.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Nightly against upstream main (UTC 09:00 ≈ 02:00 PT).
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      dynamo_ref:
        description: "Dynamo PyPI version or git ref override (e.g. 1.2.0 or git+https://github.com/ai-dynamo/dynamo@<sha>)"
        required: false
        default: ""

env:
  # Bump after manual validation against a newer Dynamo release.
  PINNED_DYNAMO_VERSION: "1.2.0"
  DYNAMO_TEST_MODEL_ID: "Qwen/Qwen3-0.6B"

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Dynamo spec
        id: dynamo-spec
        run: |
          if [[ -n "${{ inputs.dynamo_ref }}" ]]; then
            echo "spec=${{ inputs.dynamo_ref }}" >>"$GITHUB_OUTPUT"
            echo "mode=manual-override" >>"$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "schedule" ]]; then
            echo "spec=git+https://github.com/ai-dynamo/dynamo@main" >>"$GITHUB_OUTPUT"
            echo "mode=upstream-main" >>"$GITHUB_OUTPUT"
          else
            echo "spec=ai-dynamo==${PINNED_DYNAMO_VERSION}" >>"$GITHUB_OUTPUT"
            echo "mode=pinned" >>"$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Rust (nightly cron / git ref only)
        if: steps.dynamo-spec.outputs.mode != 'pinned'
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm ci

      - name: Cache HuggingFace tokenizer
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-tokenizer-${{ env.DYNAMO_TEST_MODEL_ID }}

      - name: Install Dynamo (${{ steps.dynamo-spec.outputs.mode }})
        run: |
          python -m pip install --upgrade pip
          pip install "${{ steps.dynamo-spec.outputs.spec }}"
          python -c "import dynamo.frontend; import dynamo.mocker; print('dynamo import ok')"

      - name: Run integration smoke test
        env:
          SMOKE_KEEP_LOGS: "1"
        run: ./scripts/integration-smoke.sh

      - name: Upload Dynamo logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dynamo-smoke-logs-${{ github.run_id }}
          path: |
            /tmp/pi-dynamo-smoke-*/*.log
            /tmp/pi-dynamo-smoke-*/*.jsonl
          retention-days: 7

      # Cron failures get an issue rather than a noisy red X on a PR-less SHA.
      # PR/push failures already surface via the standard required-check UI.
      - name: Open drift issue (nightly cron only)
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `integration-smoke: upstream Dynamo drift on ${new Date().toISOString().slice(0,10)}`;
            const body = [
              `Nightly integration-smoke against \`ai-dynamo/dynamo@main\` failed.`,
              ``,
              `Run: ${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
              ``,
              `Possible causes:`,
              `- Dynamo renamed or removed an \`agent_context\` field that pi-dynamo-provider still emits.`,
              `- Trace sink envelope shape changed.`,
              `- Mocker startup or \`/v1/models\` contract changed.`,
              ``,
              `Reproduce locally:`,
              "```bash",
              `pip install git+https://github.com/ai-dynamo/dynamo@main`,
              `npm ci && npm run build`,
              `./scripts/integration-smoke.sh`,
              "```",
              ``,
              `If the change is expected, bump \`PINNED_DYNAMO_VERSION\` in \`.github/workflows/integration-smoke.yml\` after validating manually.`,
            ].join("\n");
            // Reuse an existing open drift issue if one is already filed.
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "integration-smoke,upstream-drift",
            });
            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["integration-smoke", "upstream-drift"],
              });
            }
